services:
  backend:
    image: viralvideo-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    env_file: .env.docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: viralvideo-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy

  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: test
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    profiles:
      - test

  frontend-lint:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm run lint
    profiles:
      - lint
