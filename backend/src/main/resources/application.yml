server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:sqlite:${DATA_DIR:data}/viralclipper.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql

app:
  python-path: ${PYTHON_PATH:python3}
  pipeline-dir: ${PIPELINE_DIR:ai-pipeline}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
  ytdlp-path: ${YTDLP_PATH:yt-dlp}
  data-dir: ${DATA_DIR:data}
  whisper-model: ${WHISPER_MODEL:medium}
  whisper-device: ${WHISPER_DEVICE:cuda}
  whisper-language: ${WHISPER_LANGUAGE:id}
  niche-keywords: ${NICHE_KEYWORDS:rahasia,penting,trik,solusi,tip}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
